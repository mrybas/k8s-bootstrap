# Snapshot Controller - Volume Snapshot Management
# Required for CSI volume snapshots (KubeVirt VM snapshots)

id: snapshot-controller
name: Snapshot Controller
description: CSI Volume Snapshot Controller - enables VM snapshots for KubeVirt and PVC snapshots
category: storage
categoryName: Storage
categoryDescription: Storage solutions
icon: "📸"
priority: 25
docsUrl: https://github.com/kubernetes-csi/external-snapshotter

chartType: upstream
namespace: o0-snapshot-controller
releaseName: snapshot-controller
createNamespace: true
timeout: 5m

upstream:
  repository: https://piraeus.io/helm-charts
  chartName: snapshot-controller
  version: "5.0.2"
  appVersion: "8.2.0"

dependsOn: []

defaultValues:
  replicaCount: 2
  
  controller:
    resources:
      requests:
        cpu: 10m
        memory: 20Mi
      limits:
        memory: 256Mi
  
  # CRDs
  crds:
    enabled: true

jsonSchema:
  type: object
  properties:
    replicaCount:
      type: integer
      title: Replicas
      minimum: 1
      maximum: 3
      default: 2
    crds:
      type: object
      title: CRDs
      properties:
        enabled:
          type: boolean
          title: Install CRDs
          default: true
    controller:
      type: object
      title: Controller Settings
      properties:
        resources:
          type: object
          title: Resources
          properties:
            requests:
              type: object
              properties:
                cpu:
                  type: string
                  default: "10m"
                memory:
                  type: string
                  default: "20Mi"

uiSchema:
  controller:
    resources:
      ui:collapsed: true
