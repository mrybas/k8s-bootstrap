# KubeVirt Operator - Virtual Machine Management
# Enables running VMs on Kubernetes

id: kubevirt-operator
name: KubeVirt Operator
description: Run virtual machines on Kubernetes - live migration, GPU passthrough, VM management
category: virtualization
categoryName: Virtualization
categoryDescription: Virtual machine management
icon: "🖥️"
priority: 10
isOperator: true
docsUrl: https://kubevirt.io/

# KubeVirt doesn't provide official Helm chart - use kubectl apply
chartType: manifest
namespace: o0-kubevirt
createNamespace: true
podSecurityEnforce: privileged  # Required for virt-handler (hostNetwork, privileged)
timeout: 10m

version: "1.7.0"
appVersion: "v1.7.0"

# Official manifest URLs
manifests:
  - name: kubevirt-operator
    url: https://github.com/kubevirt/kubevirt/releases/download/v1.7.0/kubevirt-operator.yaml
  - name: kubevirt-cr
    url: https://github.com/kubevirt/kubevirt/releases/download/v1.7.0/kubevirt-cr.yaml

suggestsInstances:
  - kubevirt-cdi

# KubeVirt works with any CNI - no hard dependencies
# Multus is recommended for multi-NIC VMs but not required
dependsOn:
  - kubevirt-crds

defaultValues:
  # Operator configuration
  operator:
    replicas: 2
  
  # Feature gates for advanced functionality
  configuration:
    developerConfiguration:
      featureGates:
        - LiveMigration
        - GPU
        - DeclarativeHotplugVolumes
        - ExpandDisks
        - Snapshot
        - VMExport
        - HostDevices
        - Macvtap
        - HotplugNICs
    migrations:
      parallelMigrationsPerCluster: 5
      parallelOutboundMigrationsPerNode: 2
      bandwidthPerMigration: "64Mi"
      completionTimeoutPerGiB: 800
      progressTimeout: 150
  
  # ServiceMonitor for KubeVirt metrics (requires prometheus-operator-crds)
  serviceMonitor:
    enabled: false

jsonSchema:
  type: object
  properties:
    operator:
      type: object
      title: Operator Settings
      properties:
        replicas:
          type: integer
          title: Operator Replicas
          minimum: 1
          maximum: 3
          default: 2
    configuration:
      type: object
      title: KubeVirt Configuration
      properties:
        developerConfiguration:
          type: object
          title: Feature Gates
          properties:
            featureGates:
              type: array
              title: Enabled Features
              items:
                type: string
                enum:
                  - LiveMigration
                  - GPU
                  - HotplugVolumes
                  - DeclarativeHotplugVolumes
                  - ExpandDisks
                  - Snapshot
                  - VMExport
                  - HostDevices
                  - Macvtap
                  - HotplugNICs
                  - Root
                  - Sidecar
                  - VSOCK
              default:
                - LiveMigration
                - GPU
                - DeclarativeHotplugVolumes
                - ExpandDisks
                - Snapshot
        migrations:
          type: object
          title: Migration Settings
          properties:
            parallelMigrationsPerCluster:
              type: integer
              title: Parallel Migrations (Cluster)
              description: Max concurrent migrations in cluster
              minimum: 1
              maximum: 20
              default: 5
            parallelOutboundMigrationsPerNode:
              type: integer
              title: Parallel Migrations (Node)
              description: Max outbound migrations per node
              minimum: 1
              maximum: 5
              default: 2
            bandwidthPerMigration:
              type: string
              title: Migration Bandwidth
              description: Network bandwidth per migration
              default: "64Mi"
            completionTimeoutPerGiB:
              type: integer
              title: Timeout per GiB (seconds)
              default: 800
            progressTimeout:
              type: integer
              title: Progress Timeout (seconds)
              default: 150

uiSchema:
  operator:
    ui:collapsed: true
  configuration:
    developerConfiguration:
      featureGates:
        ui:widget: checkboxes
    migrations:
      ui:collapsed: true
