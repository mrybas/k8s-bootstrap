# Component Categories
# ====================
#
# Categories define the folder structure and deployment order.
# Lower priority = deployed first.
#
# Structure:
#   charts/<category>/<component>/
#   manifests/releases/<category>/<component>.yaml
#

categories:
  core:
    name: Core
    icon: "🎯"
    description: Flux and core infrastructure (deployed first)
    priority: 10

  crds:
    name: CRDs
    icon: "📋"
    description: Custom Resource Definitions (before components that use them)
    priority: 20

  networking:
    name: Networking
    icon: "🔌"
    description: CNI plugins and advanced networking (Kube-OVN, Cilium, Multus)
    priority: 25

  system:
    name: System
    icon: "⚙️"
    description: Core system components (metrics, dns, etc.)
    priority: 30

  ingress:
    name: Ingress
    icon: "🌐"
    description: Ingress controllers and load balancers
    priority: 40

  security:
    name: Security
    icon: "🔐"
    description: Security, certificates and secrets management
    priority: 50

  storage:
    name: Storage
    icon: "💾"
    description: Storage solutions
    priority: 60

  database:
    name: Database
    icon: "🗄️"
    description: Database operators and instances (PostgreSQL, etc.)
    priority: 62

  multi-tenancy:
    name: Multi-Tenancy
    icon: "🏢"
    description: Tenant control plane management (Kamaji, etc.)
    priority: 63

  backup:
    name: Backup
    icon: "🛟"
    description: Backup and disaster recovery
    priority: 65

  observability:
    name: Observability
    icon: "📊"
    description: Monitoring, logging and tracing
    priority: 70

  virtualization:
    name: Virtualization
    icon: "🖥️"
    description: Virtual machine management (KubeVirt, CDI)
    priority: 75

  gitops:
    name: GitOps
    icon: "🔄"
    description: GitOps and deployment tools
    priority: 80

  apps:
    name: Apps
    icon: "📦"
    description: Application deployments
    priority: 100
