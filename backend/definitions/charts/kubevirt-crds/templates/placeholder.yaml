# KubeVirt CRDs placeholder
# Actual CRDs are applied via bootstrap script:
# kubectl apply -f https://github.com/kubevirt/kubevirt/releases/download/v1.7.0/kubevirt-operator.yaml --server-side
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubevirt-crds-installed
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-weight: "-5"
data:
  source: "https://github.com/kubevirt/kubevirt/releases/download/v1.7.0/kubevirt-operator.yaml"
  note: "CRDs applied via bootstrap script before Flux deployment"
