{{- if .Values.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: linstor-controller
  namespace: o0-piraeus
  labels:
    app.kubernetes.io/component: linstor-controller
spec:
  namespaceSelector:
    matchNames:
      - o0-piraeus
  selector:
    matchLabels:
      app.kubernetes.io/component: linstor-controller
  endpoints:
    - port: metrics
      interval: 30s
{{- end }}
